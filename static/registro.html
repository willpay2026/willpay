<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Registro Bancario</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .registro-container { background-color: #111; border: 2px solid #bfa141; border-radius: 25px; padding: 30px; width: 100%; max-width: 400px; box-shadow: 0 0 15px rgba(191, 161, 65, 0.3); }
        h2 { color: #bfa141; text-align: center; margin-top: 0; margin-bottom: 25px; font-size: 24px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: #fff; margin-bottom: 8px; font-weight: bold; font-size: 14px; }
        input[type="text"], input[type="tel"], input[type="password"], select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background-color: #222; color: #fff; box-sizing: border-box; font-size: 16px; }
        input[type="file"] { color: #fff; background-color: #222; padding: 10px; border-radius: 10px; border: 1px solid #333; width: 100%; box-sizing: border-box; }
        .btn-finalizar { background-color: #bfa141; color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; transition: background 0.3s; }
        .btn-finalizar:hover { background-color: #fff; }
        ::placeholder { color: #888; opacity: 1; }
    </style>
</head>
<body>
    <div class="registro-container">
        <h2>Registro de Usuario Bancario</h2>
        <form action="/guardar-registro" method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Nombre Completo (Como en Cédula)</label>
                <input type="text" name="nombre" placeholder="wilyanny donquiz" required>
            </div>
            <div class="form-group">
                <label>Cédula / RIF</label>
                <input type="text" name="cedula" placeholder="34127225" required>
            </div>
            <div class="form-group">
                <label>Teléfono</label>
                <input type="tel" name="telefono" placeholder="04121055694" required>
            </div>
            <div class="form-group">
                <label>Tipo de Usuario / Actividad</label>
                <select name="tipo_usuario">
                    <option value="particular">Usuario Particular (Pasajero/Cliente)</option>
                    <option value="conductor">Conductor / Prestador de Servicio</option>
                    <option value="comercio">Comercio / Negocio</option>
                </select>
            </div>
            <div class="form-group">
                <label>Crea tu PIN de Seguridad (6 números)</label>
                <input type="password" name="pin" placeholder="••••" maxlength="6" required>
            </div>
            <div class="form-group">
                <label>Foto de Cédula (Auditoría Visual)</label>
                <input type="file" name="foto_cedula" accept="image/*" required>
            </div>
            <button type="submit" class="btn-finalizar">FINALIZAR REGISTRO Y GENERAR EXPEDIENTE</button>
        </form>
    </div>
</body>
</html>
