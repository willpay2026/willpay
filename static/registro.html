<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Registro ADN Digital</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .registro-container { background-color: #0a0a0a; border: 2px solid #bfa141; border-radius: 25px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 0 20px rgba(191, 161, 65, 0.2); }
        h2 { color: #bfa141; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; color: #bfa141; margin-bottom: 5px; font-size: 13px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background-color: #1a1a1a; color: #fff; box-sizing: border-box; font-size: 15px; outline: none; }
        input:focus { border-color: #bfa141; }
        .btn-finalizar { background-color: #bfa141; color: #000; width: 100%; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        .btn-finalizar:hover { background-color: #fff; transform: scale(1.02); }
        .info-tasa { font-size: 11px; color: #888; margin-top: 4px; display: block; }
    </style>
</head>
<body>

<div class="registro-container">
    <h2>ADN DIGITAL</h2>
    <form action="/guardar-registro" method="POST">
        
        <div class="form-group">
            <label>Nombre y Apellido</label>
            <input type="text" name="nombre" placeholder="Ej: Wilfredo Donquiz" required>
        </div>

        <div class="form-group">
            <label>Cédula o RIF</label>
            <input type="text" name="cedula_rif" placeholder="V-12345678 / J-123456789" required>
        </div>

        <div class="form-group">
            <label>Número de Teléfono</label>
            <input type="tel" name="telefono" placeholder="04126602555" required>
        </div>

        <div class="form-group">
            <label>PIN de Seguridad (6 dígitos)</label>
            <input type="password" name="pin" maxlength="6" placeholder="••••••" required>
        </div>

        <hr style="border: 0.5px solid #333; margin: 20px 0;">

        <div class="form-group">
            <label>Tipo de Usuario / Actividad</label>
            <select name="tipo_usuario" id="tipo_usuario" required onchange="gestionarCampos()">
                <option value="" disabled selected>-- Seleccione su Perfil --</option>
                <option value="natural">Usuario Natural (Pago-Cobro 1% Comisión)</option>
                <option value="personal">Usuario con Registro Personal (3% Comisión)</option>
                <option value="fiscal">Usuario con Registro Fiscal (5% Comisión)</option>
            </select>
            <span class="info-tasa">* La comisión se aplica según el servicio prestado.</span>
        </div>

        <div id="seccion_servicio" class="form-group" style="display:none;">
            <label>Especifique el Servicio</label>
            <input type="text" id="input_servicio" name="servicio_detalle" placeholder="Ej: Moto Taxi / Transporte Urbano">
        </div>

        <div id="seccion_fiscal" class="form-group" style="display:none;">
            <label>Nombre del Establecimiento</label>
            <input type="text" id="input_establecimiento" name="nombre_negocio" placeholder="Ej: Inversiones Donquiz C.A.">
        </div>

        <button type="submit" class="btn-finalizar">GENERAR ADN DIGITAL</button>
    </form>
</div>

<script>
function gestionarCampos() {
    const seleccion = document.getElementById('tipo_usuario').value;
    const divServicio = document.getElementById('seccion_servicio');
    const divFiscal = document.getElementById('seccion_fiscal');
    
    // Resetear visibilidad
    divServicio.style.display = 'none';
    divFiscal.style.display = 'none';

    // Lógica de aparición según tu instrucción
    if (seleccion === 'personal') {
        divServicio.style.display = 'block';
    } else if (seleccion === 'fiscal') {
        divFiscal.style.display = 'block';
    }
}
</script>

</body>
</html>
