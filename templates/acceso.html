<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Acceso</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #0a0a0a; border-radius: 20px; padding: 30px; width: 320px; text-align: center; }
        .logo-small { width: 150px; margin-bottom: 20px; }
        h2 { color: #d4af37; font-size: 1.2rem; letter-spacing: 1px; margin-bottom: 25px; text-transform: uppercase; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: none; background: #e8f0fe; color: #333; font-size: 1rem; text-align: center; box-sizing: border-box; }
        .btn-entrar { width: 100%; padding: 15px; background: #d4af37; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; }
        .link-registro { display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 0.9rem; }
        .link-registro span { color: #d4af37; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="{{ url_for('static', filename='logonuevo.png') }}" class="logo-small">
        <h2>ACCESO AL PANEL</h2>
        <form action="/login_proceso" method="POST">
            <input type="text" name="telefono" placeholder="04126602555" required>
            <input type="password" name="pin" placeholder="••••" required>
            <button type="submit" class="btn-entrar">ENTRAR SEGURO</button>
        </form>
        <a href="/registro" class="link-registro">¿No tienes cuenta? <span>Regístrate aquí</span></a>
    </div>
</body>
</html>
