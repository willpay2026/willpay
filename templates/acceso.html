<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Acceso Seguro</title>
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #0a0a0a;
            border: 1px solid #d4af37; /* Borde dorado */
            border-radius: 20px;
            padding: 30px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .logo-small {
            width: 120px;
            margin-bottom: 10px;
        }

        h2 {
            color: #d4af37;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            box-sizing: border-box;
            text-align: center;
        }

        input:focus {
            border-color: #d4af37;
            outline: none;
        }

        .btn-entrar {
            width: 100%;
            padding: 12px;
            background: #d4af37; /* Dorado sólido */
            color: black;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .link-registro {
            display: block;
            margin-top: 20px;
            color: #888;
            font-size: 0.8rem;
            text-decoration: none;
        }

        .link-registro span {
            color: #d4af37;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="{{ url_for('static', filename='logonuevo.png') }}" alt="Will-Pay" class="logo-small">
        
        <h2>Acceso al Panel</h2>

        <form action="/login_proceso" method="POST">
            <div class="input-group">
                <input type="text" name="usuario" placeholder="Nombre y Apellido" required>
            </div>
            <div class="input-group">
                <input type="password" name="pin" placeholder="••••" required>
            </div>
            
            <button type="submit" class="btn-entrar">Entrar Seguro</button>
        </form>

        <a href="/registro" class="link-registro">¿No tienes cuenta? <span>Regístrate aquí</span></a>
    </div>

</body>
</html>
