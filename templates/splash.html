<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Cargando el Legado</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .logo-shield { width: 150px; margin-bottom: 20px; animation: pulse 2s infinite; }
        .oro { color: #D4AF37; letter-spacing: 3px; font-size: 12px; text-transform: uppercase; margin-top: 20px; }
        .spinner { border: 3px solid rgba(212, 175, 55, 0.1); border-left-color: #D4AF37; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    </style>
</head>
<body>
    <div>
        <img src="{{ url_for('static', filename='logonuevo.png') }}" class="logo-shield">
        <h2 style="margin:0; font-weight: bold;">WILL-PAY</h2>
        <div class="spinner"></div>
        <div class="oro">Iniciando Búnker Seguro...</div>
    </div>
    <script>
        // Después de 3 segundos, salta al acceso automáticamente
        setTimeout(() => { window.location.href = "/acceso"; }, 3000);
    </script>
</body>
</html>
