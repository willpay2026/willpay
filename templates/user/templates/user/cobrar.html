<div class="boveda">
    <input type="number" id="monto" placeholder="Monto a cobrar" style="width: 80%; padding: 10px; border-radius: 10px; border: 1px solid #d4af37; background: #000; color: #fff; text-align: center; font-size: 20px;">
    <button class="btn btn-pagar" style="margin-top: 15px;" onclick="generarQR()">Generar QR de Cobro</button>
    <div id="qr-container" style="margin-top: 20px; background: white; padding: 10px; display: none;">
        <img id="qr-img" src="" style="width: 200px;">
    </div>
</div>

<script>
function generarQR() {
    const monto = document.getElementById('monto').value;
    fetch('/generar_qr', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({monto: monto})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('qr-img').src = "data:image/png;base64," + data.qr;
        document.getElementById('qr-container').style.display = 'block';
    });
}
</script>
