<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Enviar Pago</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .box { border: 2px solid #d4af37; padding: 30px 20px; border-radius: 20px; width: 100%; max-width: 350px; background: #0a0a0a; box-sizing: border-box; }
        .saldo-info { font-size: 11px; color: #888; margin-bottom: 20px; text-transform: uppercase; }
        .saldo-val { color: #00ff00; font-weight: bold; font-size: 18px; }
        
        input { 
            width: 100%; padding: 15px; margin: 10px 0; 
            border-radius: 10px; border: 1px solid #333; 
            background: #111; color: #fff; text-align: center; 
            font-size: 16px; box-sizing: border-box;
        }
        input:focus { border-color: #d4af37; outline: none; }
        
        .btn { 
            background: #d4af37; color: #000; padding: 18px; 
            width: 100%; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; margin-top: 15px;
            text-transform: uppercase; font-size: 14px;
        }
        .btn:active { transform: scale(0.98); }
        
        .cancel-link { display: block; margin-top: 25px; color: #555; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

    <img src="/static/logonuevo.png" style="width: 70px; margin-bottom: 20px;">

    <div class="box">
        <h2 style="color: #d4af37; margin-top: 0; letter-spacing: 1px;">ENVIAR PAGO</h2>
        
        <div class="saldo-info">
            TU DISPONIBLE:<br>
            <span class="saldo-val">Bs. {{ "%.2f"|format(cliente.saldo) }}</span>
        </div>

        <form action="/procesar_pago" method="POST">
            <label style="font-size: 11px; color: #d4af37; font-weight: bold;">CÉDULA O RIF DEL RECEPTOR</label>
            <input type="text" name="cedula_receptor" placeholder="Ej: V-12345678" required>
            
            <label style="font-size: 11px; color: #d4af37; font-weight: bold;">MONTO A ENVIAR (BS.)</label>
            <input type="number" step="0.01" name="monto" placeholder="0.00" required max="{{ cliente.saldo }}">
            
            <button type="submit" class="btn">CONFIRMAR TRANSFERENCIA</button>
        </form>
        
        <a href="/dashboard" class="cancel-link">Volver al Dashboard</a>
    </div>

    <div style="margin-top: 40px; font-size: 10px; color: #222;">
        TRANSACCIÓN SEGURA | WILL-PAY ADN
    </div>

</body>
</html>
