<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Enviar Pago</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px; 
        }
        /* La Caja Blindada Estilo Will-Pay */
        .box { 
            border: 2px solid #d4af37; 
            padding: 30px 20px; 
            border-radius: 25px; 
            width: 100%; 
            max-width: 380px; 
            background: #0a0a0a; 
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.1);
        }
        .oro-text { color: #d4af37; }
        .saldo-info { 
            background: #111;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #222;
        }
        .saldo-val { 
            color: #00ff00; 
            font-weight: 800; 
            font-size: 24px; 
            display: block;
        }
        
        /* Inputs Estilo Dark */
        label { 
            font-size: 11px; 
            color: #d4af37; 
            font-weight: bold; 
            display: block; 
            margin-bottom: 5px;
            text-align: left;
            padding-left: 5px;
        }
        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            background: #151515; 
            color: #fff; 
            text-align: center; 
            font-size: 18px; 
            transition: 0.3s;
        }
        input:focus { border-color: #d4af37; outline: none; background: #1a1a1a; }
        
        /* Botón de Poder */
        .btn-confirmar { 
            background: #d4af37; 
            color: #000; 
            padding: 18px; 
            width: 100%; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 15px;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-confirmar:active { transform: scale(0.96); }
        .btn-confirmar:hover { background: #f1c40f; }

        .cancel-link { 
            display: block; 
            margin-top: 25px; 
            color: #666; 
            text-decoration: none; 
            font-size: 13px; 
            font-weight: bold;
        }
        .cancel-link:hover { color: #d4af37; }
    </style>
</head>
<body>

    <img src="/static/logonuevo.png" alt="Will-Pay" style="width: 85px; margin-bottom: 25px;">

    <div class="box">
        <h3 class="oro-text fw-bold mb-4" style="letter-spacing: 2px;">ENVIAR PAGO</h3>
        
        <div class="saldo-info">
            <small class="text-secondary">TU DISPONIBLE ACTUAL</small>
            <span class="saldo-val">Bs. {{ "{:,.2f}".format(cliente.saldo) }}</span>
        </div>

        <form action="/procesar_pago" method="POST">
            <div>
                <label>CÉDULA O RIF DEL DESTINATARIO</label>
                <input type="text" name="cedula_receptor" placeholder="Ej: V-13496133" required>
            </div>
            
            <div>
                <label>MONTO A TRANSFERIR (BS.)</label>
                <input type="number" step="0.01" name="monto" id="monto_envio" placeholder="0.00" required>
                <div id="error-saldo" class="text-danger small mb-2" style="display: none;">Saldo insuficiente</div>
            </div>
            
            <button type="submit" id="btn-submit" class="btn-confirmar">
                🚀 CONFIRMAR TRANSFERENCIA
            </button>
        </form>
        
        <a href="/dashboard" class="cancel-link">← VOLVER AL DASHBOARD</a>
    </div>

    <div style="margin-top: 40px; font-size: 11px; color: #333; letter-spacing: 1px;">
        TRANSACCIÓN SEGURA | WILL-PAY ADN &bull; 2026
    </div>

    <script>
        const inputMonto = document.getElementById('monto_envio');
        const btnSubmit = document.getElementById('btn-submit');
        const errorMsg = document.getElementById('error-saldo');
        const saldoDisponible = {{ cliente.saldo }};

        inputMonto.addEventListener('input', () => {
            if (parseFloat(inputMonto.value) > saldoDisponible) {
                errorMsg.style.display = 'block';
                btnSubmit.disabled = true;
                btnSubmit.style.opacity = '0.5';
            } else {
                errorMsg.style.display = 'none';
                btnSubmit.disabled = false;
                btnSubmit.style.opacity = '1';
            }
        });
    </script>

</body>
</html>
