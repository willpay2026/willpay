<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Will-Pay | Enviar Pago</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px solid #d4af37; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        .btn { background: #d4af37; color: #000; padding: 15px; width: 85%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color: #d4af37;">ENVIAR PAGO</h2>
        <form action="/procesar_pago" method="POST">
            <input type="text" name="cedula_receptor" placeholder="Cédula del receptor (Ej: 202020)" required>
            <input type="number" step="0.01" name="monto" placeholder="Monto en Bs" required>
            <button type="submit" class="btn">CONFIRMAR TRANSFERENCIA</button>
        </form>
        <br>
        <a href="/dashboard" style="color: #888; text-decoration: none;">Cancelar</a>
    </div>
</body>
</html>
