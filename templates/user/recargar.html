<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Recargar Saldo</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        .container { width: 100%; max-width: 400px; text-align: center; }
        .logo { width: 80px; margin-bottom: 20px; }
        
        /* Caja de Datos Bancarios */
        .info-banco { 
            background: #111; border: 1px solid #d4af37; border-radius: 15px; 
            padding: 20px; margin-bottom: 25px; text-align: left;
        }
        .banco-titulo { color: #d4af37; font-size: 12px; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .dato { font-size: 14px; margin: 5px 0; color: #fff; }
        .dato span { color: #d4af37; font-weight: bold; }

        /* Formulario */
        form { background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        label { display: block; text-align: left; font-size: 12px; color: #888; margin-bottom: 5px; text-transform: uppercase; }
        input { 
            width: 100%; padding: 12px; margin-bottom: 20px; 
            background: #1a1a1a; color: #fff; border: 1px solid #333; 
            border-radius: 8px; box-sizing: border-box; text-align: center;
        }
        
        .btn-recarga { 
            background: #d4af37; color: #000; font-weight: bold; border: none; 
            padding: 18px; width: 100%; border-radius: 10px; cursor: pointer; 
            font-size: 14px; text-transform: uppercase;
        }
        
        .nota { font-size: 10px; color: #555; margin-top: 15px; line-height: 1.4; }
        .btn-volver { display: block; margin-top: 25px; color: #888; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="/static/logonuevo.png" class="logo">
        <h2 style="color: #d4af37; font-size: 18px; text-transform: uppercase; margin-bottom: 25px;">Recargar Saldo</h2>

        <div class="info-banco">
            <div class="banco-titulo">Datos de Transferencia / Pago Móvil</div>
            <div class="dato">BANCO: <span>BANESCO (0134)</span></div>
            <div class="dato">TELÉFONO: <span>04126602555</span></div>
            <div class="dato">ID / RIF: <span>13496133</span></div>
            <div class="dato">TITULAR: <span>WILFREDO DONQUIZ</span></div>
        </div>

        <form action="/procesar_recarga" method="POST" enctype="multipart/form-data">
            <label>Monto Transferido (Bs.)</label>
            <input type="number" step="0.01" name="monto" placeholder="0.00" required>

            <label>Número de Referencia (Últimos 4-6 dígitos)</label>
            <input type="text" name="referencia" placeholder="Ej: 123456" required>

            <label>Capture del Pago (Opcional)</label>
            <input type="file" name="capture" style="border: none; background: transparent; color: #d4af37;">

            <button type="submit" class="btn-recarga">Reportar Pago al Búnker</button>
        </form>

        <div class="nota">
            * El sistema verificará que la referencia no haya sido utilizada antes. <br>
            * Una vez reportado, el CEO aprobará tu saldo en pocos minutos.
        </div>

        <a href="/dashboard" class="btn-volver">Volver al Dashboard</a>
    </div>

</body>
</html>
