<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .boveda { border: 2px solid #d4af37; border-radius: 20px; padding: 20px; width: 90%; text-align: center; margin-bottom: 20px; }
        .saldo { font-size: 32px; font-weight: bold; color: #d4af37; }
        .btn-group { display: flex; gap: 10px; width: 90%; justify-content: center; }
        .btn { border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; flex: 1; text-transform: uppercase; }
        .btn-pagar { background-color: #d4af37; color: #000; }
        .btn-cobrar { background-color: #333; color: #fff; border: 1px solid #444; }
        .movimientos { width: 95%; margin-top: 30px; }
        .tabla { width: 100%; border-collapse: collapse; font-size: 12px; }
        .tabla th { background-color: #d4af37; color: #000; padding: 8px; }
        .tabla td { border-bottom: 1px solid #222; padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <img src="/static/logo.png" style="width: 120px; margin-bottom: 20px;">
    <div class="boveda">
        <p style="color: #888; font-size: 14px;">Saldo Disponible</p>
        <div class="saldo">Bs. {{ "%.2f"|format(u.saldo) }}</div>
    </div>
    
    <div class="btn-group">
        <button class="btn btn-pagar" onclick="location.href='/pagar'">Pagar</button>
        <button class="btn btn-cobrar" onclick="location.href='/cobrar'">Cobrar</button>
    </div>

    <div class="movimientos">
        <p style="text-align: center; font-weight: bold;">Últimos Movimientos</p>
        <table class="tabla">
            <tr><th>FECHA</th><th>REF</th><th>MONTO</th></tr>
            {% for m in movimientos %}
            <tr>
                <td>{{ m.fecha.strftime('%d/%m') }}</td>
                <td>{{ m.referencia }}</td>
                <td>Bs. {{ m.monto }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
