<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Mi Billetera</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 15px; }
        .logo-small { width: 100px; margin-top: 10px; }
        .saldo-card { 
            border: 2px solid #d4af37; border-radius: 20px; padding: 20px; 
            margin: 20px 0; background: linear-gradient(145deg, #0a0a0a, #1a1a1a);
        }
        .saldo-label { color: #d4af37; font-size: 14px; font-weight: bold; }
        .saldo-monto { color: #fff; font-size: 36px; font-weight: bold; margin: 10px 0; }
        .btn-action { 
            width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; 
            text-transform: uppercase; margin-bottom: 10px; cursor: pointer; border: none;
        }
        .btn-recargar { background: #d4af37; color: #000; width: 48%; float: left; }
        .btn-retirar { background: #333; color: #fff; width: 48%; float: right; }
        .btn-pagar { background: #333; color: #fff; width: 48%; float: left; margin-top: 10px; }
        .btn-cobrar { background: #333; color: #fff; width: 48%; float: right; margin-top: 10px; }
        .input-monto { 
            width: 100%; padding: 15px; background: #000; border: 1px solid #d4af37; 
            color: #fff; border-radius: 10px; font-size: 28px; text-align: center; margin: 20px 0;
        }
        .recarga-box { background: #111; border-radius: 15px; padding: 15px; text-align: left; margin-top: 20px; display: none; }
    </style>
</head>
<body>
    <img src="{{ url_for('static', filename='logonuevo.png') }}" class="logo-small">
    
    <div class="saldo-card">
        <div class="saldo-label">Saldo Disponible</div>
        <div class="saldo-monto">Bs. {{ "%.2f"|format(u.saldo) }}</div>
        <div style="overflow: hidden;">
            <button class="btn-action btn-recargar" onclick="document.getElementById('modal-recarga').style.display='block'">RECARGAR</button>
            <button class="btn-action btn-retirar">RETIRAR</button>
        </div>
    </div>

    <div style="overflow: hidden;">
        <button class="btn-action btn-pagar" onclick="procesarTransaccion()">PAGAR</button>
        <button class="btn-action btn-cobrar">COBRAR</button>
    </div>

    <input type="number" id="monto_input" class="input-monto" placeholder="0.00">

    <div id="modal-recarga" class="recarga-box">
        <p style="color:#d4af37; font-weight:bold;">PAGO MÓVIL: Banesco | 04126602555 | ID 13496133</p>
        <form action="/reportar_pago" method="POST" enctype="multipart/form-data">
            <input type="text" name="referencia" placeholder="Referencia" required style="width:100%; padding:8px; margin-bottom:5px;">
            <input type="file" name="capture" required style="font-size:10px;">
            <button type="submit" class="btn-action btn-recargar" style="width:100%; margin-top:10px;">ENVIAR REPORTE</button>
        </form>
    </div>

    <audio id="beepSound" src="{{ url_for('static', filename='beep.mp3') }}" preload="auto"></audio>

    <script>
    function procesarTransaccion() {
        let monto = document.getElementById('monto_input').value;
        if(!monto || monto <= 0) return alert("Monto inválido");

        fetch('/procesar_pago', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({monto: monto})
        })
        .then(res => res.json())
        .then(data => {
            if(data.success) {
                document.getElementById('beepSound').play();
                setTimeout(() => { window.location.href = '/comprobante/' + data.t_id; }, 500);
            } else { alert(data.message); }
        });
    }
    </script>
</body>
</html>
