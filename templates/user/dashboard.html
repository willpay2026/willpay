<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Panel</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --dorado: #d4af37; --negro: #000; --gris: #111; }
        body { background: var(--negro); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .logo { width: 130px; margin: 20px 0; }
        .boveda { border: 2px solid var(--dorado); border-radius: 25px; padding: 25px; width: 90%; max-width: 380px; text-align: center; margin-bottom: 20px; background: #050505; }
        .saldo { font-size: 38px; font-weight: bold; color: var(--dorado); }
        .btn-group { display: flex; gap: 10px; width: 90%; max-width: 380px; }
        .btn { border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; flex: 1; text-transform: uppercase; }
        .btn-pagar { background: var(--dorado); color: #000; }
        .btn-cobrar { background: var(--gris); color: #fff; border: 1px solid #333; }
        
        /* Estilo de las Ventanas Modales */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { background: var(--gris); width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; border: 1px solid var(--dorado); text-align: center; }
        input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; font-size: 18px; text-align: center; box-sizing: border-box; }
        .btn-cerrar { color: #888; margin-top: 20px; cursor: pointer; font-size: 14px; text-decoration: underline; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 2px solid var(--dorado); }
        #qr-result img { background: white; padding: 10px; border-radius: 10px; margin-top: 15px; }
    </style>
</head>
<body>
    <img src="/static/logonuevo.png" class="logo">
    
    <div class="boveda">
        <p style="color: #666; font-size: 12px; letter-spacing: 2px;">SALDO DISPONIBLE</p>
        <div class="saldo">Bs. {{ "%.2f"|format(u.saldo) }}</div>
    </div>
    
    <div class="btn-group">
    <button class="btn btn-pagar" onclick="abrirPagar()">
        <span style="font-size: 18px; margin-right: 5px;">📷</span> Pagar
    </button>
    
    <button class="btn btn-cobrar" onclick="abrirCobrar()">
        <span style="font-size: 18px; margin-right: 5px;">💰</span> Cobrar
    </button>
</div>

    <div id="modalCobrar" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--dorado);">GENERAR COBRO</h3>
            <input type="number" id="montoCobro" placeholder="0.00">
            <button class="btn btn-pagar" style="width: 100%;" onclick="generarQR()">Crear Código QR</button>
            <div id="qr-result"></div>
            <div class="btn-cerrar" onclick="cerrarModales()">Cancelar</div>
        </div>
    </div>

    <div id="modalPagar" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--dorado);">ESCANEAR PARA PAGAR</h3>
            <div id="reader"></div>
            <div class="btn-cerrar" onclick="cerrarModales()">Cerrar Cámara</div>
        </div>
    </div>

    <script>
        let html5QrCode;

        function abrirCobrar() { document.getElementById('modalCobrar').style.display = 'flex'; }
        
        function generarQR() {
            const monto = document.getElementById('montoCobro').value;
            if(!monto) return alert("Pon un monto");
            const data = `{{ u.cedula }}|${monto}`;
            const qrDiv = document.getElementById('qr-result');
            qrDiv.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${data}">`;
        }

        async function abrirPagar() {
            document.getElementById('modalPagar').style.display = 'flex';
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                const [receptor, monto] = decodedText.split('|');
                if(confirm(`¿Deseas pagar Bs. ${monto} a la cédula ${receptor}?`)) {
                    procesarPago(receptor, monto);
                }
                cerrarModales();
            });
        }

        function procesarPago(receptor, monto) {
            fetch('/ejecutar_pago', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({receptor: receptor, monto: monto})
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === 'ok') {
                    alert("¡Pago Exitoso!");
                    location.reload();
                } else {
                    alert("Error: " + data.msg);
                }
            });
        }

        function cerrarModales() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            if(html5QrCode) html5QrCode.stop();
            document.getElementById('qr-result').innerHTML = '';
        }
    </script>
</body>
</html>
