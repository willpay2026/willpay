<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .logo { width: 120px; margin-bottom: 10px; }
        .saludo { font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        .boveda-card { border: 2px solid #d4af37; border-radius: 25px; width: 100%; max-width: 350px; padding: 20px; text-align: center; box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }
        .label { color: #888; text-transform: uppercase; font-size: 12px; letter-spacing: 1px; }
        .monto-grande { font-size: 42px; font-weight: bold; color: #fff; margin: 10px 0; }
        .monto-grande span { color: #d4af37; font-size: 24px; }
        .btn-amarillo { background-color: #d4af37; color: #000; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; width: 80%; cursor: pointer; margin-top: 10px; }
        .tabla-titulo { margin-top: 30px; text-transform: uppercase; font-size: 14px; font-weight: bold; }
        .tabla-movimientos { width: 100%; max-width: 380px; margin-top: 10px; border-collapse: separate; border-spacing: 0 5px; }
        .tabla-movimientos th { background-color: #d4af37; color: #000; padding: 10px; font-size: 12px; }
        .tabla-movimientos td { background-color: #111; padding: 12px; text-align: center; font-size: 11px; border-bottom: 1px solid #222; }
        .status-exito { color: #4caf50; font-weight: bold; }
        .logout { color: #666; text-decoration: none; margin-top: 40px; font-size: 12px; }
    </style>
</head>
<body>
    <img src="/static/logonuevo.png" class="logo">
    <div class="saludo">Hola, {{ u.nombre }}</div>

    <div class="boveda-card">
        <div class="label">Saldo Disponible</div>
        <div class="monto-grande">Bs. {{ u.saldo }}</div>
        <button class="btn-amarillo" onclick="location.href='/recargar'">RECARGAR</button>
    </div>

    <div class="tabla-titulo">Últimos Movimientos</div>
    <table class="tabla-movimientos">
        <tr><th>FECHA</th><th>REF</th><th>MONTO</th></tr>
        {% for m in movimientos %}
        <tr>
            <td>{{ m.fecha.strftime('%Y-%m-%d') }}</td>
            <td>{{ m.referencia }}</td>
            <td>Bs. {{ m.monto }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/logout" class="logout">Cerrar Sesión Segura</a>
</body>
</html>
