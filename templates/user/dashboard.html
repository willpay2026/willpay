<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Búnker</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --dorado: #d4af37; --negro: #000; }
        body { background: var(--negro); color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .boveda { border: 2px solid var(--dorado); border-radius: 20px; padding: 20px; width: 100%; max-width: 350px; text-align: center; margin-bottom: 20px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; width: 100%; max-width: 350px; margin-bottom: 10px; }
        .btn { border: none; padding: 15px; border-radius: 10px; font-weight: bold; flex: 1; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-pagar { background: var(--dorado); color: #000; }
        .btn-cobrar { background: #222; color: #fff; border: 1px solid #444; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .modal-content { background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--dorado); width: 85%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
        .item { width: 100%; max-width: 350px; border-bottom: 1px solid #222; padding: 12px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <img src="/static/logonuevo.png" style="width: 80px; margin-bottom: 20px;">
    
    <div class="boveda">
        <p style="font-size: 11px; color: #888; margin: 0;">SALDO DISPONIBLE</p>
        <h2 style="font-size: 34px; margin: 10px 0;">Bs. {{ "%.2f"|format(u.saldo) }}</h2>
        <button class="btn" style="background:#111; color:var(--dorado); border:1px solid var(--dorado); width:100%" onclick="abrirModal('modalRetirar')">🏦 RETIRAR A PAGO MÓVIL</button>
    </div>

    <div class="btn-group">
        <button class="btn btn-pagar" onclick="abrirModal('modalPagar')">📤 PAGAR (QR)</button>
        <button class="btn btn-cobrar" onclick="abrirModal('modalCobrar')">📥 COBRAR (CÁMARA)</button>
    </div>

    <div style="width:100%; max-width:350px; margin-top:20px;">
        <p style="color:#444; font-size:11px; font-weight:bold; text-transform:uppercase;">Historial de Movimientos</p>
        {% for m in movimientos %}
        <div class="item">
            <span style="font-size:12px;">{{ m.tipo }}<br><small style="color:#444;">{{ m.fecha.strftime('%d/%m %H:%M') }}</small></span>
            <span style="color:var(--dorado); font-weight:bold;">Bs. {{ "%.2f"|format(m.monto) }}</span>
        </div>
        {% endfor %}
    </div>

    <div id="modalRetirar" class="modal"><div class="modal-content">
        <h3 style="color:var(--dorado)">SOLICITAR RETIRO</h3>
        <p style="font-size:11px; color:#888;">Se enviará a: {{ u.banco }}<br>{{ u.telefono_pago }}</p>
        <form action="/solicitar_retiro" method="POST">
            <input type="number" name="monto" placeholder="Monto Bs." required step="0.01" max="{{ u.saldo }}">
            <button type="submit" class="btn btn-pagar" style="width:100%">CONFIRMAR RETIRO</button>
        </form>
        <p onclick="cerrarModales()" style="cursor:pointer; color:#555; margin-top:15px;">Cancelar</p>
    </div></div>

    <script>
        function abrirModal(id) { document.getElementById(id).style.display = 'flex'; }
        function cerrarModales() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }
    </script>
</body>
</html>
