<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #1a1a1a; display: flex; justify-content: center; padding: 20px; font-family: monospace; }
        .ticket { background-color: #fff; width: 100%; max-width: 320px; padding: 20px; border-radius: 15px; color: #000; text-align: center; }
        .linea { border-top: 1px dashed #000; margin: 10px 0; }
        .status-box { background-color: #e8f5e9; color: #2e7d32; padding: 5px; display: inline-block; font-weight: bold; }
        .btn-fin { background-color: #000; color: #fff; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body onload="document.getElementById('beep').play()">
    <audio id="beep" src="/static/beep.mp3"></audio>
    <div class="ticket">
        <img src="/static/logonuevo.png" style="width: 60px;">
        <div style="font-size: 12px; font-weight: bold;">COMPROBANTE ELECTRÓNICO</div>
        <div class="linea"></div>
        <div style="text-align: left; font-size: 11px;">
            <p>Nro. OPERACIÓN: {{ tx.referencia }}</p>
            <p>FECHA: {{ tx.fecha }}</p>
            <p>ESTATUS: <span class="status-box">CERTIFICADO ✅</span></p>
        </div>
        <div class="linea"></div>
        <div style="font-size: 20px; font-weight: bold;">Bs. {{ tx.monto }}</div>
        <button class="btn-fin" onclick="location.href='/dashboard'">FINALIZAR</button>
    </div>
</body>
</html>
