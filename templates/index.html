<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Billetera Digital</title>
    <style>
        /* Estilos base del Búnker */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            overflow: hidden;
        }

        /* 1. Splash Screen (4 segundos de elegancia) */
        #splash-screen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-out;
        }

        .logo-splash {
            width: 200px;
            margin-bottom: 20px;
        }

        .loader {
            border: 3px solid #333;
            border-top: 3px solid #d4af37; /* Dorado Will-Pay */
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 15px;
            color: #d4af37;
            letter-spacing: 2px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 2. Panel de Acceso */
        #login-panel {
            display: none; /* Oculto hasta que pase el splash */
            height: 100vh;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
        }

        .login-card {
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border: 1px solid #d4af37; /* Borde dorado */
            border-radius: 15px;
            width: 85%;
            max-width: 350px;
            text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .login-card h2 {
            color: #d4af37;
            font-size: 1.2rem;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
        }

        .btn-entrar {
            width: 100%;
            padding: 15px;
            background: #d4af37;
            border: none;
            border-radius: 8px;
            color: black;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .link-registro {
            display: block;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://i.imgur.com/TuLogoDorado.png" alt="Will-Pay" class="logo-splash"> 
        <div class="loader"></div>
        <div class="loading-text">CARGANDO EL LEGADO...</div>
    </div>

    <div id="login-panel">
        <div class="login-card">
            <img src="https://i.imgur.com/TuLogoChico.png" style="width: 80px; margin-bottom: 10px;">
            <h2>ACCESO AL PANEL</h2>
            <form id="auth-form">
                <input type="text" placeholder="Nombre y Apellido" required>
                <input type="text" placeholder="Usuario (admin)" required>
                <input type="password" placeholder="••••" required>
                <button type="submit" class="btn-entrar">ENTRAR SEGURO</button>
            </form>
            <a href="#" class="link-registro">¿No tienes cuenta? Regístrate aquí</a>
        </div>
    </div>

    <script>
        // Lógica de los 4 segundos
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            const login = document.getElementById('login-panel');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                login.style.display = 'flex';
            }, 1000); // Tiempo de desvanecimiento
        }, 4000); // 4 segundos exactos de espera

        // Beep al entrar (Simulación)
        document.getElementById('auth-form').onsubmit = (e) => {
            e.preventDefault();
            console.log("Beep!"); // Aquí conectaremos el sonido después
            alert("Accediendo al Búnker...");
        };
    </script>
</body>
</html>
