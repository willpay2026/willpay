<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Billetera Digital</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* 1. Splash Screen */
        #splash-screen {
            position: fixed; width: 100%; height: 100%; background: black;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 9999; transition: opacity 1s ease-out;
        }
        .logo-splash { width: 200px; margin-bottom: 20px; }
        .loader {
            border: 3px solid #333; border-top: 3px solid #d4af37;
            border-radius: 50%; width: 30px; height: 30px;
            animation: spin 1s linear infinite;
        }
        .loading-text { margin-top: 15px; color: #d4af37; letter-spacing: 2px; font-size: 0.8rem; font-weight: bold; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Estilo Común para Paneles */
        .panel { display: none; height: 100vh; justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        .login-card {
            background: rgba(20, 20, 20, 0.9); padding: 40px; border: 1px solid #d4af37;
            border-radius: 15px; width: 85%; max-width: 350px; text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }
        h2 { color: #d4af37; font-size: 1.2rem; margin-bottom: 25px; }
        input, select {
            width: 100%; padding: 12px; margin: 10px 0; background: #111;
            border: 1px solid #333; border-radius: 8px; color: white; box-sizing: border-box;
        }
        .btn-entrar {
            width: 100%; padding: 15px; background: #d4af37; border: none;
            border-radius: 8px; color: black; font-weight: bold; margin-top: 20px;
            cursor: pointer; text-transform: uppercase;
        }
        .link-registro { display: block; margin-top: 20px; font-size: 0.8rem; color: #888; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://i.imgur.com/TuLogoDorado.png" alt="Will-Pay" class="logo-splash"> 
        <div class="loader"></div>
        <div class="loading-text">CARGANDO EL LEGADO...</div>
    </div>

    <div id="login-panel" class="panel">
        <div class="login-card">
            <img src="https://i.imgur.com/TuLogoChico.png" style="width: 80px; margin-bottom: 10px;">
            <h2>ACCESO AL PANEL</h2>
            <form id="auth-form">
                <input type="text" placeholder="Usuario" required>
                <input type="password" placeholder="Clave" required>
                <button type="submit" class="btn-entrar">ENTRAR SEGURO</button>
            </form>
            <div class="link-registro" onclick="irARegistro()">¿No tienes cuenta? Regístrate aquí</div>
        </div>
    </div>

    <div id="register-panel" class="panel" style="overflow-y: auto;">
        <div class="login-card" style="margin: 20px 0;">
            <h2>EXPEDIENTE DIGITAL (KYC)</h2>
            <form id="kyc-form">
                <input type="text" placeholder="Nombre Completo" required>
                <input type="text" placeholder="Cédula / RIF" required>
                <input type="tel" placeholder="Teléfono" required>
                <select required>
                    <option value="" disabled selected>Actividad Económica</option>
                    <option value="normal">Usuario Normal</option>
                    <option value="comercio">Comercio / Emprendedor</option>
                </select>
                <div style="font-size: 0.7rem; color: #d4af37; text-align: left; margin-left: 5px;">FOTO CÉDULA</div>
                <input type="file" accept="image/*">
                <button type="submit" class="btn-entrar">CREAR CUENTA</button>
            </form>
            <div class="link-registro" onclick="irALogin()">¿Ya tienes cuenta? Entra aquí</div>
        </div>
    </div>

    <script>
        // Manejo de tiempos (4 segundos)
        setTimeout(() => {
            const splash = document.getElementById('splash-screen');
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                document.getElementById('login-panel').style.display = 'flex';
            }, 1000);
        }, 4000);

        // Navegación
        function irARegistro() {
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('register-panel').style.display = 'flex';
        }
        function irALogin() {
            document.getElementById('register-panel').style.display = 'none';
            document.getElementById('login-panel').style.display = 'flex';
        }

        // Auditoría (Beep simulado)
        document.getElementById('kyc-form').onsubmit = (e) => {
            e.preventDefault();
            console.log("Beep!");
            alert("¡Expediente enviado! Auditando datos para Wilyanny...");
        };
    </script>
</body>
</html>
