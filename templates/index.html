<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WilDON-SEARCH | Sistema de Rastreo</title>
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; --card: #1a1a1a; }
        
        /* --- ESTILOS DEL SPLASH SCREEN --- */
        #splash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;
            background: var(--dark);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .splash-logo {
            color: var(--gold);
            font-size: 3rem;
            letter-spacing: 8px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .loader-bar {
            width: 200px; height: 2px;
            background: #222; margin-top: 20px;
            position: relative; overflow: hidden;
        }
        .loader-progress {
            width: 0%; height: 100%;
            background: var(--gold);
            position: absolute;
            animation: load 2.5s forwards;
        }
        @keyframes load { to { width: 100%; } }

        /* --- CUERPO PRINCIPAL (Oculto al inicio) --- */
        body { 
            background-color: var(--dark); color: white; 
            font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; 
            display: flex; flex-direction: column; align-items: center; 
        }
        #main-content { opacity: 0; transition: opacity 1s ease; width: 100%; max-width: 650px; }

        /* (Mantén el resto de tus estilos de .container, .search-box, etc. aquí abajo) */
        .container { text-align: center; margin-top: 20px; }
        .search-box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--gold); }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; background: #000; color: white; border: 1px solid #333; }
        button { width: 100%; padding: 16px; border-radius: 12px; background: var(--gold); font-weight: bold; cursor: pointer; border: none; }
        .results { margin-top: 30px; text-align: left; }
        .link-card { background: var(--card); padding: 15px; margin-bottom: 10px; border-left: 4px solid var(--gold); border-radius: 8px; }
        .link-card a { color: var(--gold); text-decoration: none; word-break: break-all; }
        .footer { margin-top: 50px; color: #333; font-size: 0.7rem; text-align: center; }
    </style>
</head>
<body>

    <div id="splash">
        <div class="splash-logo">WilDON</div>
        <div style="color: #555; font-size: 0.6rem; letter-spacing: 3px; margin-top: 10px;">ESTACIÓN DE INTELIGENCIA</div>
        <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>

    <div id="main-content" class="container">
        <h1>WilDON-SEARCH</h1>
        <p style="color: #555; font-size: 0.7rem; letter-spacing: 2px;">SISTEMA DE RASTREO VENEZUELA</p>

        <div class="search-box">
            <form action="/buscar" method="post">
                <input type="text" name="busqueda" placeholder="Nombre o Cédula..." required>
                <select name="extension">
                    <option value="triangulacion">🛡️ TRIANGULACIÓN (CNE/IVSS/Redes)</option>
                    <option value="gps">📍 UBICACIÓN / GPS</option>
                    <option value="all">🌐 TODO EL INTERNET</option>
                </select>
                <button type="submit">Iniciar Rastreo</button>
            </form>
        </div>

        {% if resultados %}
            <div class="results">
                {% for res in resultados %}
                    <div class="link-card">
                        <a href="{{ res.link }}" target="_blank">
                            <h4 style="margin: 0;">{{ res.titulo }}</h4>
                            <small>{{ res.link }}</small>
                        </a>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <div class="footer">
            &copy; 2026 WilDON-SEARCH | LEGADO PARA WILYANNY
        </div>
    </div>

    <script>
        // Función para quitar el Splash y mostrar el contenido
        window.addEventListener('load', function() {
            setTimeout(function() {
                const splash = document.getElementById('splash');
                const content = document.getElementById('main-content');
                
                splash.style.opacity = '0';
                splash.style.visibility = 'hidden';
                content.style.opacity = '1';
            }, 2500); // 2.5 segundos de Splash
        });
    </script>
</body>
</html>
