<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | El Legado</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; display: flex;
            justify-content: center; align-items: center;
            overflow: hidden;
        }

        #splash-container {
            text-align: center;
            transition: opacity 1s ease-out;
            animation: aparecer 1.5s ease-out;
        }

        /* Ajuste del logo para que no salga roto */
        .logo-willpay {
            width: 280px;
            max-width: 85vw;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.4));
        }

        @keyframes aparecer {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div id="splash-container">
        <img src="{{ url_for('static', filename='logonuevo.png') }}" alt="Will-Pay" class="logo-willpay">
    </div>

    <script>
        // 4 SEGUNDOS DE IMPACTO
        setTimeout(() => {
            document.getElementById('splash-container').style.opacity = '0';
            setTimeout(() => {
                window.location.href = "/acceso";
            }, 1000);
        }, 4000);
    </script>
</body>
</html>
