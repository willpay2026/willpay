<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background:#000; margin:0; display:flex; justify-content:center; align-items:center; height:100vh; font-family:sans-serif; overflow:hidden; }
        .logo-box { text-align:center; }
        h1 { color:#d4af37; font-size:3.5rem; letter-spacing:10px; margin:0; }
        .loader { width:180px; height:2px; background:#111; margin:25px auto; overflow:hidden; }
        .bar { width:0%; height:100%; background:#d4af37; animation:load 2.5s forwards; }
        @keyframes load { to { width:100%; } }
    </style>
</head>
<body>
    <div class="logo-box">
        <h1>WILL-PAY</h1>
        <p style="color:#555; letter-spacing:3px; font-size:0.7rem;">SISTEMA FINANCIERO DIGITAL</p>
        <div class="loader"><div class="bar"></div></div>
    </div>
    <script>
        // REDIRECCIÓN AUTOMÁTICA AL ACCESO
        setTimeout(() => { window.location.href = "{{ url_for('login') }}"; }, 3000);
    </script>
</body>
</html>
