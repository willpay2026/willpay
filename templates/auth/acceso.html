<!DOCTYPE html>
<html lang="es">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background:#0a0a0a; color:#fff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; height:100vh; margin:0; }
        .login-card { background:#111; padding:40px; border-radius:25px; border:1px solid #d4af37; width:320px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        input { width:100%; padding:14px; margin:10px 0; background:#000; border:1px solid #333; color:white; border-radius:10px; box-sizing:border-box; }
        button { width:100%; padding:16px; background:#d4af37; border:none; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color:#d4af37; letter-spacing:2px;">ACCESO</h2>
        <form action="/login" method="POST">
            <input type="text" name="cedula" placeholder="Cédula de Identidad" required>
            <input type="password" name="password" placeholder="PIN de Seguridad" required>
            <button type="submit">ENTRAR AL SISTEMA</button>
        </form>
        <p style="font-size:0.8rem; margin-top:20px;">
            ¿No tienes cuenta? <br>
            <a href="{{ url_for('registro') }}" style="color:#d4af37; text-decoration:none; font-weight:bold;">REGÍSTRATE AQUÍ (KYC)</a>
        </p>
    </div>
</body>
</html>
