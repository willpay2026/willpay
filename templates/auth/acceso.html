<!DOCTYPE html>
<html lang="es">
<head>

        <a href="/panel_ceo" class="btn-gold">ENTRAR AL BÚNKER</a>
        <a href="/registro" style="color: #f1c40f; text-decoration: none; display: block; margin-top: 20px; font-size: 0.9em;">¿No tienes cuenta? Regístrate</a>
