<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay Acceso</title>
    <style>
        body { 
            background: #000; 
            color: #fff; 
            font-family: sans-serif; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            height: 100vh; 
            margin: 0; 
            padding: 20px; 
            box-sizing: border-box;
        }

        .main-container {
            max-width: 400px; 
            width: 100%; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-willpay { 
            width: 220px; /* Tamaño ideal según tu imagen */
            margin-bottom: 40px; 
        }

        .panel-title {
            color: #d4af37; /* Dorado Wildon */
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .user-label {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Inputs claritos como tu diseño original */
        input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 15px; 
            background: #e8f0fe; 
            border: none; 
            color: #333; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            text-align: center; 
        }

        .btn-gold { 
            background: #d4af37; 
            color: #000; 
            border: none; 
            padding: 18px; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: 900; 
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
            font-size: 18px; 
            margin-top: 15px; 
            text-transform: uppercase;
        }

        .footer-link { 
            color: #d4af37; 
            text-decoration: none; 
            display: block; 
            margin-top: 30px; 
            font-size: 16px; 
        }

        .wildon-footer { 
            color: #d4af37; 
            font-size: 12px; 
            margin-top: 60px; 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    
    <div class="main-container">
        <img src="{{ url_for('static', filename='logonuevo.png') }}" alt="Will-Pay" class="logo-willpay">

        <p class="panel-title">ACCESO AL PANEL</p>
        <p class="user-label">Nombre y Apellido</p>

        <form action="/login" method="POST" style="width: 100%;">
            <input type="text" name="cedula" placeholder="04126602555" required>
            <input type="password" name="pin" placeholder="••••" required>
            
            <button type="submit" class="btn-gold">ENTRAR</button>
        </form>

        <a href="/registro" class="btn-secundario">Crear Cuenta Nueva</a>
        
        <p class="wildon-footer">Creado por Wildon C.A</p>
    </div>
</body>
</html>
