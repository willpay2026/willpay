<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Registro Seguro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .main-container { max-width: 450px; margin: auto; }
        .logo { width: 140px; margin-bottom: 10px; }
        .gold-title { color: #d4af37; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        label { display: block; text-align: left; font-weight: bold; margin: 15px 0 5px 5px; font-size: 13px; color: #d4af37; }
        input, select { width: 100%; padding: 15px; margin-bottom: 10px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .kyc-box { background: #111; border: 1px solid #d4af37; padding: 15px; border-radius: 10px; margin: 20px 0; text-align: left; }
        .terms-box { font-size: 12px; color: #aaa; text-align: left; margin: 15px 0; display: flex; align-items: center; }
        .btn-finalizar { background: #d4af37; color: #000; border: none; padding: 20px; width: 100%; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .footer-wildon { color: #d4af37; font-size: 11px; margin-top: 40px; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="main-container">
        <img src="{{ url_for('static', filename='logonuevo.png') }}" alt="Will-Pay" class="logo">
        <p class="gold-title">REGISTRO DE USUARIO</p>

        <form action="/crear_cuenta" method="POST" enctype="multipart/form-data">
            <label>Nombre Completo (Como en Cédula)</label>
            <input type="text" name="nombre" required>

            <label>Cédula / RIF</label>
            <input type="text" name="cedula" required>

            <label>Teléfono</label>
            <input type="text" name="telefono" required>

            <label>Tipo de Usuario / Actividad</label>
            <select name="tipo_usuario">
                <option value="personal">Personal (Natural)</option>
                <option value="actividad">Actividad Económica (Emprendedor)</option>
                <option value="juridico">Registro Jurídico (Empresa)</option>
            </select>

            <label>Crea tu PIN de Seguridad (6 números)</label>
            <input type="password" name="pin" maxlength="6" required>

            <div class="kyc-box">
                <label style="color: #fff;">Foto de Cédula (Auditoría Visual)</label>
                <input type="file" name="foto_cedula" accept="image/*" required>
                <label style="color: #fff;">Foto Selfie</label>
                <input type="file" name="foto_selfie" accept="image/*" required>
            </div>

            <div class="terms-box">
                <input type="checkbox" id="acepto" required style="width: 20px; margin-right: 10px;">
                <label for="acepto" style="color: #aaa; margin: 0;">Acepto los <a href="/terminos" style="color: #d4af37;">Términos y Condiciones</a> y el cobro de comisiones por transacción.</label>
            </div>

            <button type="submit" class="btn-finalizar">FINALIZAR REGISTRO Y GENERAR EXPEDIENTE</button>
        </form>
        <p class="footer-wildon">CREADO POR WILDON C.A</p>
    </div>
</body>
</html>
