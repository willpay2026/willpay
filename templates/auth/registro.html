<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Registro</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #111; color: #fff; border: 1px solid #333; border-radius: 8px; box-sizing: border-box; }
        .btn-crear { background: #d4af37; color: #000; font-weight: bold; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; margin-top: 15px; }
        .banca-box { border: 1px solid #d4af37; padding: 15px; border-radius: 12px; margin-top: 15px; background: #050505; text-align: left; width: 100%; max-width: 320px; }
    </style>
</head>
<body>
    <img src="/static/logonuevo.png" style="width: 100px; margin-bottom: 20px;">
    <h2 style="color: #d4af37;">CREAR CUENTA</h2>
    
    <form action="/register" method="POST" style="width: 100%; max-width: 320px;">
        <input type="text" name="nombre" placeholder="Nombre Completo" required>
        <input type="text" name="cedula" placeholder="Cédula de Identidad" required>
        <input type="password" name="password" placeholder="Contraseña de acceso" required>

        <div class="banca-box">
            <p style="color: #d4af37; font-size: 11px; margin: 0 0 10px 0; font-weight: bold;">DATOS DE PAGO MÓVIL (PARA RETIROS)</p>
            <select name="banco" required>
                <option value="" disabled selected>Selecciona tu Banco</option>
                <option value="BANESCO">BANESCO</option>
                <option value="MERCANTIL">MERCANTIL</option>
                <option value="PROVINCIAL">PROVINCIAL</option>
                <option value="VENEZUELA">VENEZUELA</option>
                <option value="BNC">BNC</option>
                <option value="BANCAMIGA">BANCAMIGA</option>
            </select>
            <input type="text" name="telefono_pago" placeholder="Teléfono Pago Móvil" required>
            <input type="text" name="cedula_pago" placeholder="Cédula del Titular" required>
        </div>

        <button type="submit" class="btn-crear">REGISTRARSE</button>
        <a href="/acceso" style="color: #555; display: block; text-align: center; margin-top: 15px; text-decoration: none; font-size: 12px;">Volver al inicio</a>
    </form>
</body>
</html>
