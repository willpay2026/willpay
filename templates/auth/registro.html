<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Will-Pay | Registro Legal</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: #0a0a0a; padding: 25px; border-radius: 20px; border: 1px solid #d4af37; }
        h2 { color: #d4af37; text-align: center; text-transform: uppercase; font-size: 1.2rem; }
        label { color: #d4af37; font-weight: bold; font-size: 0.85rem; display: block; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 10px; border: 1px solid #333; background: #151515; color: #fff; box-sizing: border-box; }
        .file-box { border: 1px dashed #444; padding: 15px; margin-top: 10px; border-radius: 10px; background: #111; }
        .btn-finalizar { background: #d4af37; color: #000; width: 100%; padding: 18px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 25px; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color:#d4af37; text-align:center; margin:0;">Will-Pay</h1>
        <h2>Registro de Usuario</h2>
        <form action="/registro" method="POST" enctype="multipart/form-data">
            <label>Nombre Completo</label>
            <input type="text" name="nombre" required>
            <label>Cédula / RIF</label>
            <input type="text" name="cedula" required>
            <label>Teléfono</label>
            <input type="text" name="telefono" value="04126602555">
            <label>Perfil Económico</label>
            <select name="tipo_usuario">
                <option value="Personal">Usuario Personal (1.2% Comisión)</option>
                <option value="Comercio">Comercio / Aliado (1.0% Comisión)</option>
            </select>
            <label>PIN (6 números)</label>
            <input type="password" name="password" maxlength="6" required>

            <h3 style="color:#d4af37; margin-top:25px; font-size:0.9rem;">DATOS BANCARIOS (RETIROS)</h3>
            <label>Banco</label>
            <select name="banco">
                <option value="0102">Banco de Venezuela</option>
                <option value="0134">Banesco</option>
                <option value="0105">Mercantil</option>
            </select>
            <input type="text" name="telefono_pago" placeholder="Teléfono Pago Móvil">
            <input type="text" name="cedula_titular" placeholder="Cédula del Titular">

            <div class="file-box">
                <label>Foto de Cédula</label>
                <input type="file" name="foto_cedula" accept="image/*" required>
            </div>
            <div class="file-box">
                <label>Foto Selfie</label>
                <input type="file" name="foto_selfie" accept="image/*" required>
            </div>
            <button type="submit" class="btn-finalizar">FINALIZAR Y GENERAR EXPEDIENTE</button>
        </form>
    </div>
</body>
</html>
