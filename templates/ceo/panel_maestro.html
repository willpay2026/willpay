<div class="form-card" style="border: 1px solid #d4af37; background: #0a0a0a;">
    <div class="form-title" style="color: #d4af37;">🤝 PUESTOS ESTRATÉGICOS (SOCIOS)</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="socio-box">
            <span class="socio-label">SOCIO 1</span>
            <input type="number" step="0.1" value="{{ u.socio1_rate }}" placeholder="%">
        </div>
        <div class="socio-box">
            <span class="socio-label">SOCIO 2</span>
            <input type="number" step="0.1" value="{{ u.socio2_rate }}" placeholder="%">
        </div>
        <div class="socio-box">
            <span class="socio-label">SOCIO 3</span>
            <input type="number" step="0.1" value="{{ u.socio3_rate }}" placeholder="%">
        </div>
        <div class="socio-box">
            <span class="socio-label">SOCIO 4</span>
            <input type="number" step="0.1" value="{{ u.socio4_rate }}" placeholder="%">
        </div>
        <div class="socio-box" style="grid-column: span 2;">
            <span class="socio-label">SOCIO 5</span>
            <input type="number" step="0.1" value="{{ u.socio5_rate }}" placeholder="%">
        </div>
    </div>
</div>

<div class="form-card">
    <div class="form-title">⚙️ MODALIDAD DEL BÚNKER</div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <span style="font-size: 12px;">AUTO-APROBACIÓN CARGAS</span>
        <label class="switch">
            <input type="checkbox" {% if u.auto_aprobacion %}checked{% endif %}>
            <span class="slider"></span>
        </label>
    </div>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="font-size: 12px;">AUTO-APROBACIÓN RETIROS</span>
        <label class="switch">
            <input type="checkbox" {% if u.auto_retiros %}checked{% endif %}>
            <span class="slider"></span>
        </label>
    </div>
</div>

<style>
    .socio-box { background: #1a1a1a; padding: 10px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; }
    .socio-label { font-size: 10px; color: #888; margin-bottom: 5px; }
    .socio-box input { background: transparent; border: none; border-bottom: 1px solid #d4af37; color: #d4af37; text-align: center; font-weight: bold; }
    
    /* El switch dorado */
    .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
    .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
    input:checked + .slider { background-color: #d4af37; }
    input:checked + .slider:before { transform: translateX(20px); }
</style>
