<div class="card amarillo" style="border-left: 5px solid #f1c40f; background: #111; margin: 10px; padding: 15px; border-radius: 10px;">
        <p style="font-size: 0.8em; margin: 0;">EN TRANSACCIÓN</p>
        <h2 style="margin: 5px 0;">Bs. {{ "%.2f"|format(depositado) }}</h2>
    </div>

    <div class="card verde" style="border-left: 5px solid #00ff00; background: #111; margin: 10px; padding: 15px; border-radius: 10px;">
        <p style="font-size: 0.8em; margin: 0; color: #00ff00;">NETO GANANCIAS (LEGADO)</p>
        <h2 style="margin: 5px 0;">Bs. {{ "%.2f"|format(config.ganancias_legado) }}</h2>
    </div>

    <div style="background: #111; padding: 20px; border-radius: 20px; margin: 15px; text-align: left; border: 1px solid #222;">
        <h3 style="color: #f1c40f; margin-top: 0;">⚡ RECARGA DIRECTA</h3>
        <form action="/cargar_saldo" method="POST">
            <input type="text" name="telefono" placeholder="Número de Teléfono" style="width: 100%; padding: 15px; margin-bottom: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px;">
            <input type="number" step="0.01" name="monto" placeholder="Monto en Bs." style="width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px;">
            <button type="submit" style="width: 100%; padding: 15px; background: #f1c40f; color: #000; border: none; border-radius: 10px; font-weight: bold; font-size: 1em;">CARGAR SALDO</button>
        </form>
    </div>

    <div style="background: #111; padding: 20px; border-radius: 20px; margin: 15px; text-align: left; border: 1px solid #222;">
        <h3 style="color: #f1c40f; margin-top: 0;">⚙️ AUTOMATIZACIÓN</h3>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span>Auto-Aprobación Saldo</span>
            <label class="switch"><input type="checkbox" {% if config.auto_saldo %}checked{% endif %}><span class="slider"></span></label>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span>Auto-Aprobación Retiro</span>
            <label class="switch"><input type="checkbox" {% if config.auto_retiro %}checked{% endif %}><span class="slider"></span></label>
        </div>
        <p style="color: #444; font-size: 0.7em; text-align: center;">VINCULADO AL BÚNKER EN RENDER</p>
    </div>

    <form action="/activar_panico" method="POST" style="margin: 15px;">
        <button type="submit" style="width: 100%; padding: 15px; background: #ff0000; color: #fff; border: none; border-radius: 10px; font-weight: bold;">🚨 BOTÓN DE PÁNICO</button>
    </form>
