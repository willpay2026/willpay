<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificado de Registro | Will-Pay</title>
    <style>
        body { background: #000; color: white; text-align: center; font-family: 'Courier New', Courier, monospace; padding: 20px; }
        .oro { color: #D4AF37; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Estilo Recibo Real */
        .ticket-container { 
            background: white; 
            color: black; 
            width: 100%; 
            max-width: 350px; 
            margin: 20px auto; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .header-ticket { border-bottom: 2px dashed #000; padding-bottom: 10px; margin-bottom: 15px; }
        .header-ticket h3 { margin: 5px 0; font-size: 18px; }
        .rif { font-size: 10px; color: #555; }
        .status-badge { background: #000; color: #D4AF37; padding: 5px 10px; font-size: 12px; font-weight: bold; }
        
        .info-row { display: flex; justify-content: space-between; margin: 10px 0; font-size: 13px; text-align: left; }
        .label { font-weight: bold; text-transform: uppercase; }
        
        .divider { border-top: 1px solid #eee; margin: 15px 0; }
        .footer-note { font-size: 9px; color: #777; font-style: italic; }

        .btn-finalizar { 
            background: #000; 
            color: #D4AF37; 
            text-decoration: none; 
            display: block; 
            padding: 15px; 
            border-radius: 10px; 
            font-weight: bold; 
            margin-top: 25px;
            border: 2px solid #D4AF37;
        }
    </style>
</head>
<body>
    <h2 class="oro">¡Registro Exitoso!</h2>
    
    <div class="ticket-container">
        <div class="header-ticket">
            <img src="/logonuevo.png" width="60" alt="Logo">
            <h3>WILL-PAY VENEZUELA</h3>
            <div class="rif">RIF: V-13496133-0</div>
            <div class="status-badge" style="margin-top: 10px;">CERTIFICADO ELECTRÓNICO</div>
        </div>

        <div class="info-row">
            <span class="label">ID OPERACIÓN:</span>
            <span>WP-{{ u.id }}REG</span>
        </div>
        <div class="info-row">
            <span class="label">SOCIO:</span>
            <span>{{ u.nombre }}</span>
        </div>
        <div class="info-row">
            <span class="label">ESTATUS:</span>
            <span style="color: green; font-weight: bold;">CERTIFICADO ✅</span>
        </div>

        <div class="divider"></div>
        <p class="footer-note">Este ticket sirve como respaldo para auditorías contables de la red Will-Pay.</p>

        <a href="/acceso" class="btn-finalizar">FINALIZAR Y ENTRAR</a>
    </div>
</body>
</html>
