<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Registro</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; padding: 20px; }
        .register-card { background: #0a0a0a; border-radius: 20px; padding: 30px; max-width: 450px; margin: auto; }
        h2 { color: #d4af37; text-align: center; margin-bottom: 30px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #eee; }
        input, select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; box-sizing: border-box; }
        input[type="file"] { background: none; border: none; }
        .btn-finalizar { width: 100%; padding: 15px; background: #d4af37; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .resaltado { background: #e8f0fe !important; color: #333 !important; }
    </style>
</head>
<body>
    <div class="register-card">
        <h2>Registro de Usuario Bancario</h2>
        <form action="/registro_proceso" method="POST" enctype="multipart/form-data">
            <label>Nombre Completo (Como en Cédula)</label>
            <input type="text" name="nombre" placeholder="Ej: Wilyanny Donquiz" required>
            
            <div style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Cédula / RIF</label>
                    <input type="text" name="cedula" placeholder="V-12345678" required>
                </div>
                <div style="flex: 1;">
                    <label>Teléfono</label>
                    <input type="text" name="telefono" class="resaltado" placeholder="04126602555" required>
                </div>
            </div>

            <label>Tipo de Usuario / Actividad</label>
            <select name="tipo">
                <option>Usuario Particular (Pasajero/Cliente)</option>
                <option>Comercio / Emprendedor</option>
                <option>Chofer / Transporte</option>
            </select>

            <label style="color: #d4af37;">Crea tu PIN de Seguridad (6 números)</label>
            <input type="password" name="pin" class="resaltado" maxlength="6" placeholder="••••••" required>

            <label>Foto de Cédula (Auditoría Visual)</label>
            <input type="file" name="foto_cedula" required>

            <button type="submit" class="btn-finalizar">FINALIZAR REGISTRO Y GENERAR EXPEDIENTE</button>
        </form>
    </div>
</body>
</html>
