<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Comprobante Will-Pay</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .ticket { border: 2px solid #D4AF37; padding: 30px; border-radius: 30px; text-align: center; width: 320px; background: #0a0a0a; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .monto { font-size: 35px; color: #D4AF37; margin: 20px 0; font-weight: bold; }
        .success-icon { font-size: 40px; color: #2ecc71; margin-bottom: 10px; }
        .btn-volver { background: #D4AF37; color: #000; padding: 12px; border-radius: 10px; text-decoration: none; display: block; margin-top: 25px; font-weight: bold; border: none; width: 100%; }
        .details { font-size: 12px; text-align: left; border-top: 1px dashed #333; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="ticket">
        <div class="success-icon">✓</div>
        <h3 style="margin:0; letter-spacing: 2px;">PAGO EXITOSO</h3>
        <div class="monto">Bs. {{ "%.2f"|format(pago.monto) }}</div>
        
        <div class="details">
            <p><strong>REF:</strong> WP-TX-{{ pago.id }}<br>
               <strong>DE:</strong> {{ pago.emisor }}<br>
               <strong>A:</strong> {{ pago.receptor }}<br>
               <strong>FECHA:</strong> {{ pago.fecha }}</p>
        </div>
        
        <p style="font-size: 10px; color: #666; margin-top: 15px;">Will-Pay: Revolucionando Falcon y Venezuela</p>
        <a href="/dashboard" class="btn-volver">VOLVER A BÓVEDA</a>
    </div>
</body>
</html>
