<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Will-Pay | Registrar Pago</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { background: #1a1a1a; padding: 30px; border-radius: 15px; border: 1px solid #d4af37; max-width: 400px; margin: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .btn-send { background: #d4af37; color: #000; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .back { display: block; text-align: center; margin-top: 20px; color: #d4af37; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #d4af37; text-align: center;">Nueva Transferencia</h2>
        <form action="/procesar_pago" method="POST">
            <label>Cédula del Receptor:</label>
            <input type="text" name="cedula_receptor" placeholder="Ej: 20123456" required>
            
            <label>Monto (USD):</label>
            <input type="number" step="0.01" name="monto" placeholder="0.00" required>
            
            <label>Concepto / Motivo:</label>
            <input type="text" name="motivo" placeholder="Ej: Pago de Luz">
            
            <button type="submit" class="btn-send">EJECUTAR PAGO WP</button>
        </form>
        <a href="/dashboard" class="back">← Volver al Búnker</a>
    </div>
</body>
</html>
