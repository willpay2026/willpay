<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Billetera</title>
    <style>
        /* ESTILO BÚNKER ORIGINAL */
        body { 
            background: #000; 
            margin: 0; 
            padding: 0; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        /* EL MARCO DORADO QUE ENVUELVE TODO */
        .bunker-frame {
            border: 1px solid #d4af37;
            height: 97vh;
            margin: 1.5vh;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px;
            box-sizing: border-box;
        }

        .logo-top { margin-top: 10px; opacity: 0.9; }
        
        .saldo-display { text-align: center; margin-top: 50px; }
        .label-gold { color: #d4af37; font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 8px; }
        .monto-principal { font-size: 4.2rem; font-weight: bold; }

        /* BOTÓN RECARGAR (MARCO FINO DORADO) */
        .btn-recargar {
            width: 100%;
            border: 1px solid #d4af37;
            background: transparent;
            color: #d4af37;
            padding: 12px;
            border-radius: 10px;
            margin-top: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
        }

        /* BOTONES PAGAR Y COBRAR */
        .btn-row {
            display: flex;
            width: 100%;
            gap: 12px;
            margin-top: 25px;
        }
        .btn-action {
            flex: 1;
            padding: 22px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .btn-gold { background: #d4af37; color: #000; }
        .btn-dark { background: #1a1a1a; color: #fff; border: 1px solid #222; }

        .movimientos-titulo {
            width: 100%;
            text-align: left;
            margin-top: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #fff;
        }

        .btn-cerrar {
            color: #ff3333;
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: auto;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div class="bunker-frame">
        <div class="logo-top">
            <img src="/static/logo_willpay.png" alt="Will-Pay" style="width: 130px;">
        </div>

        <div class="saldo-display">
            <div class="label-gold">Saldo Disponible</div>
            <div class="monto-principal">Bs. {{ user.saldo }}</div>
        </div>

        <button class="btn-recargar">RECARGAR</button>

        <div class="btn-row">
            <button class="btn-action btn-gold">PAGAR</button>
            <button class="btn-action btn-dark">COBRAR</button>
        </div>

        <div class="movimientos-titulo">Últimos Movimientos</div>

        <a href="#" class="btn-cerrar">Cerrar Sesión</a>
    </div>
</body>
</html>
