<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Dashboard</title>
    <style>
        body { background: #000; color: white; font-family: 'Arial', sans-serif; margin: 0; padding: 0; }
        .top-bar { padding: 20px; text-align: center; }
        .logo { width: 150px; }
        
        .saldo-box { text-align: center; padding: 40px 20px; }
        .saldo-label { color: #d4af37; font-size: 1.2rem; margin-bottom: 10px; }
        .saldo-monto { font-size: 3.5rem; font-weight: bold; }

        .btn-group { display: flex; gap: 10px; padding: 0 20px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-gold { background: #d4af37; color: #000; }
        .btn-dark { background: #1a1a1a; color: #fff; border: 1px solid #333; }

        .form-recarga { background: #0a0a0a; margin: 20px; padding: 25px; border-radius: 20px; border: 1px solid #222; }
        .pago-movil-info { border: 1px dashed #d4af37; padding: 15px; text-align: center; color: #d4af37; font-size: 0.9rem; margin-bottom: 20px; border-radius: 10px; }
        
        input, .file-input { width: 100%; padding: 15px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .btn-send { width: 100%; background: #008f39; color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold; }

        .movimientos { padding: 20px; }
        .mov-card { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #d4af37; }
        .mov-info span { display: block; font-size: 0.8rem; color: #666; }
    </style>
</head>
<body>
    <div class="top-bar">
        <img src="/static/logo_willpay.png" class="logo" alt="Will-Pay">
    </div>

    <div class="saldo-box">
        <div class="saldo-label">Saldo Disponible</div>
        <div class="saldo-monto">Bs. {{ user.saldo if user else '0.00' }}</div>
    </div>

    <div class="btn-group">
        <button class="btn btn-gold" onclick="showRecarga()">Recargar</button>
        <button class="btn btn-dark">Retirar</button>
    </div>

    <div id="recarga-area" class="form-recarga">
        <div class="pago-movil-info">
            PAGO MÓVIL: 04126602555 | 13496133 | BANESCO [cite: 2026-03-01]
        </div>
        <form action="/solicitar_recarga" method="POST" enctype="multipart/form-data">
            <input type="number" name="monto" placeholder="Monto en Bs." required>
            <input type="text" name="referencia" placeholder="Número de Referencia (12 dígitos)" required>
            <label style="font-size: 0.8rem; color: #888;">Adjuntar Captura del Banco:</label>
            <input type="file" name="captura" class="file-input" required>
            <button type="submit" class="btn-send">ENVIAR RECARGA</button>
        </form>
    </div>

    <div class="movimientos">
        <h3 style="color: #d4af37; font-size: 1rem;">Últimos Movimientos</h3>
        {% for m in movimientos %}
        <div class="mov-card">
            <div class="mov-info">
                {{ m.tipo_operacion }}
                <span>{{ m.fecha_movimiento.strftime('%Y-%m-%d %H:%M') }}</span>
            </div>
            <div style="color: #00ff00;">+ Bs. {{ m.monto }}</div>
        </div>
        {% endfor %}
    </div>

    <script>
        function playBeep() {
            var audio = new Audio('/static/beep.mp3');
            audio.play();
        }
        // Llamar a playBeep() cuando el estatus cambie a "Aprobado"
    </script>
</body>
</html>
