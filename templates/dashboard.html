<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Mi Bóveda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .boveda-card { background: linear-gradient(145deg, #111, #000); border: 2px solid #D4AF37; border-radius: 30px; padding: 30px; margin-top: 50px; }
        .oro { color: #D4AF37; }
        .monto { font-size: 3rem; font-weight: bold; }
        .btn-recarga { background: #D4AF37; color: #000; font-weight: bold; border-radius: 15px; border: none; padding: 12px; width: 100%; }
        .info-pago { background: rgba(212, 175, 55, 0.1); border: 1px dashed #D4AF37; padding: 15px; border-radius: 15px; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="boveda-card text-center">
            <img src="{{ url_for('static', filename='logonuevo.png') }}" width="80" class="mb-3">
            <h5 class="text-secondary">SALDO DISPONIBLE</h5>
            <div class="monto oro">Bs. {{ "%.2f"|format(u.saldo) }}</div>
            <p class="small">Socio: <strong>{{ u.nombre }}</strong></p>

            <hr class="border-secondary my-4">

            <div class="info-pago mb-4">
                <p class="mb-1 oro">PARA RECARGAR SALDO:</p>
                <p class="mb-0">Pago Móvil Banesco (0134)<br>
                Tel: <strong>04126602555</strong><br>
                C.I: <strong>13496133</strong></p>
            </div>

            <form action="/reportar_pago" method="POST">
                <input type="number" step="0.01" name="monto" class="form-control bg-dark text-white border-secondary mb-2" placeholder="Monto transferido" required>
                <input type="text" name="referencia" class="form-control bg-dark text-white border-secondary mb-3" placeholder="Últimos 4 o 6 dígitos de referencia" required>
                <button type="submit" class="btn-recarga">NOTIFICAR PAGO AL CEO</button>
            </form>

            <div class="mt-4">
                <a href="/expediente" class="text-secondary small text-decoration-none">📂 Ver mi Expediente ADN</a>
            </div>
        </div>
    </div>
</body>
</html>
