<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will-Pay | Acceso</title>
    <style>
        body { background-color: #000; color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #d4af37; width: 320px; text-align: center; }
        .logo-mini { width: 100px; margin-bottom: 15px; }
        h2 { color: #d4af37; margin-bottom: 20px; font-size: 1.1rem; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; box-sizing: border-box; text-align: center; }
        .btn-entrar { background: #d4af37; color: #000; width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .reg-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/static/logo.jpg" class="logo-mini">
        <h2>Acceso al Panel</h2>
        <form action="/login" method="POST">
            <input type="text" name="cedula" placeholder="Cédula / RIF" required>
            <input type="password" name="password" placeholder="PIN de Seguridad" required>
            <button type="submit" class="btn-entrar">ENTRAR SEGURO</button>
        </form>
        <a href="/registro" class="reg-link">¿No tienes cuenta? Regístrate aquí</a>
    </div>
</body>
</html>
