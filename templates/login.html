<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Will-Pay | Iniciar Sesión</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1a1a1a; padding: 2rem; border-radius: 15px; border: 1px solid #d4af37; text-align: center; width: 300px; }
        h1 { color: #d4af37; margin-bottom: 1.5rem; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #d4af37; border: none; color: #000; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Will-Pay</h1>
        <form action="/login" method="post">
            <input type="text" name="cedula" placeholder="Cédula de Identidad" required>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">ENTRAR AL BÚNKER</button>
        </form>
    </div>
</body>
</html>
